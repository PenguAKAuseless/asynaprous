<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid P2P Chat</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        #sidebar ul { list-style: none; padding: 0; }
        #sidebar li { padding: 10px; cursor: pointer; border-bottom: 1px solid #34495e; }
        #sidebar li:hover { background: #34495e; }
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        #header { padding: 20px; background: #ecf0f1; border-bottom: 1px solid #bdc3c7; }
        /* T13: Scrollable message window */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; background: #fff; }
        .msg { margin-bottom: 15px; }
        .msg-time { font-size: 0.8em; color: #7f8c8d; }
        .msg-sender { font-weight: bold; color: #2980b9; }
        #input-area { padding: 20px; background: #ecf0f1; display: flex; }
        #msg-input { flex-grow: 1; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; }
        button { padding: 10px 20px; margin-left: 10px; background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Channels</h3>
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px;">
            <input type="text" id="channel-input" placeholder="channel name" style="padding:8px; border:1px solid #34495e; border-radius:4px;">
            <button onclick="createChannel()" style="margin-left:0;">Create</button>
            <button onclick="joinChannel()" style="margin-left:0; background:#1f7a8c;">Join</button>
        </div>
        <ul id="channel-list"></ul>
    </div>
    <div id="chat-area">
        <div id="header"><h2 id="current-channel"># general</h2></div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message (immutable)...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/js/chat-ui.js"></script>
</body>
</html>
