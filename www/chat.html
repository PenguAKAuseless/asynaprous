<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asynaprous Chat Platform</title>
    <style>
        :root {
            --bg: #f0f4fa;
            --panel: #0f172a;
            --panel-soft: #111f36;
            --panel-border: #2a3c5a;
            --panel-muted: #93a7c6;
            --panel-active: #22c1ff;
            --text: #0f172a;
            --card: #ffffff;
            --line: #d2dbe7;
            --accent: #067f74;
            --accent-alt: #0369a1;
            --danger: #b91c1c;
            --menu-bg: #f8fbff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 10% -10%, #d9f3ff 0%, #edf2f8 50%, #f6f9ff 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 320px;
            background: var(--panel);
            color: white;
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        .sidebar-title h1 {
            margin: 0;
            font-size: 1.15rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .sidebar-title p {
            margin: 6px 0 0;
            font-size: 0.85rem;
            color: var(--panel-muted);
        }

        .panel-section {
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 10px;
            background: rgba(18, 36, 66, 0.42);
        }

        .panel-section.channels-panel {
            border-color: #2f547f;
            background: linear-gradient(180deg, rgba(22, 44, 78, 0.78), rgba(18, 36, 66, 0.66));
        }

        .panel-section.p2p-panel {
            border-color: #3f5878;
            background: linear-gradient(180deg, rgba(27, 47, 77, 0.64), rgba(18, 36, 66, 0.5));
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 0.84rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #dbeafe;
        }

        .panel-add-btn {
            border: 1px solid #2e4d79;
            border-radius: 999px;
            background: #132848;
            color: #d7e9ff;
            cursor: pointer;
            font-size: 0.74rem;
            padding: 4px 8px;
            white-space: nowrap;
        }

        .panel-add-btn:hover {
            border-color: #4ab7ff;
            color: white;
        }

        .item-list {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 170px;
            overflow-y: auto;
        }

        .item-list li {
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 6px;
            font-size: 0.88rem;
            color: #f8fafc;
            background: rgba(51, 65, 85, 0.35);
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .item-list li.empty-state {
            border: none;
            background: transparent;
            color: #b2c0d9;
            padding: 2px 1px;
            margin-bottom: 0;
            display: block;
            cursor: default;
        }

        .row-main {
            border: none;
            background: transparent;
            color: inherit;
            text-align: left;
            cursor: pointer;
            font-size: inherit;
            line-height: 1.2;
            padding: 2px;
        }

        .row-menu-trigger {
            border: none;
            background: #14345c;
            color: #dbeafe;
            border-radius: 6px;
            cursor: pointer;
            padding: 3px 7px;
            font-weight: 700;
            line-height: 1;
        }

        .item-list li:hover,
        .item-list li.active {
            border-color: var(--panel-active);
            background: rgba(14, 165, 233, 0.22);
        }

        .item-list li.empty-state:hover {
            border-color: transparent;
            background: transparent;
        }

        .row-menu {
            position: fixed;
            z-index: 30;
            min-width: 180px;
            border: 1px solid #bfd0e8;
            border-radius: 9px;
            background: var(--menu-bg);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
            padding: 6px;
            display: none;
        }

        .row-menu.open {
            display: block;
        }

        .row-menu button {
            width: 100%;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: #1e293b;
            cursor: pointer;
            text-align: left;
            padding: 7px 8px;
            font-size: 0.84rem;
        }

        .row-menu button:hover {
            background: #eaf3ff;
        }

        .row-menu button.leave {
            color: #991b1b;
        }

        #account-strip {
            margin-top: auto;
            border: 1px solid var(--panel-border);
            border-radius: 11px;
            background: rgba(17, 38, 69, 0.78);
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
        }

        #account-user {
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }

        #account-peer-id {
            margin-top: 4px;
            color: var(--panel-muted);
            font-size: 0.78rem;
            line-height: 1.2;
        }

        #logout-btn {
            border: none;
            border-radius: 9px;
            padding: 9px 13px;
            font-weight: 700;
            color: white;
            background: var(--danger);
            cursor: pointer;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 9px 12px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: var(--accent);
        }

        .btn.secondary {
            background: var(--accent-alt);
        }

        .btn.mini {
            font-size: 0.82rem;
            padding: 6px 9px;
        }

        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        #header-main {
            min-width: 0;
        }

        #header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        #header p {
            margin: 6px 0 0;
            color: #475569;
            font-size: 0.92rem;
        }

        #close-conversation-btn {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            color: #334155;
            font-weight: 700;
            padding: 8px 11px;
            cursor: pointer;
            white-space: nowrap;
        }

        #close-conversation-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #workspace-tools {
            display: none;
            gap: 10px;
            grid-template-columns: 1fr;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            background: var(--card);
        }

        #workspace-tools.visible {
            display: grid;
        }

        .composer {
            display: none;
            gap: 8px;
        }

        .composer.visible {
            display: grid;
        }

        .tool-row {
            display: grid;
            gap: 8px;
            align-items: center;
            grid-template-columns: 1fr auto;
        }

        .tool-row input,
        .tool-row select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 9px;
            font-size: 0.9rem;
            background: #fff;
        }

        #p2p-peer-search-results {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #cfdae8;
            border-radius: 8px;
            background: #f8fbff;
            display: none;
        }

        #p2p-peer-search-results.visible {
            display: block;
        }

        #p2p-peer-search-results li {
            padding: 7px 9px;
            cursor: pointer;
            border-bottom: 1px solid #e2e9f4;
            font-size: 0.85rem;
        }

        #p2p-peer-search-results li:last-child {
            border-bottom: none;
        }

        #p2p-peer-search-results li:hover {
            background: #e8f2ff;
        }

        #selected-peer-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        #selected-peer-preview {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            overflow: hidden;
        }

        #selected-peer-overflow {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            border: 1px solid #cfdae8;
            border-radius: 8px;
            background: #f8fbff;
            margin-top: 4px;
        }

        #selected-peer-overflow.hidden {
            display: none;
        }

        .peer-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 5px 10px;
            background: #dbeafe;
            color: #0c4a6e;
            font-size: 0.82rem;
        }

        .peer-chip button {
            border: none;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
        }

        #peer-overflow-toggle.hidden {
            display: none;
        }

        #p2p-actions {
            display: flex;
            justify-content: flex-end;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }

        .msg {
            width: 100%;
            margin-bottom: 8px;
            padding: 2px 0;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg-time {
            font-size: 0.76rem;
            color: #64748b;
        }

        .msg-sender {
            font-weight: 700;
            color: #0f766e;
        }

        #input-area {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            background: white;
        }

        #msg-input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
        }

        #input-area.disabled #msg-input {
            background: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
        }

        #input-area.disabled #send-btn {
            background: #9ca3af;
            cursor: not-allowed;
        }

        #toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            min-width: 220px;
            max-width: 420px;
            padding: 10px 12px;
            border-radius: 8px;
            color: white;
            background: #111827;
            display: none;
            z-index: 10;
        }

        #action-modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 60;
        }

        #action-modal.visible {
            display: flex;
        }

        #action-modal-card {
            width: min(420px, 100%);
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 18px 32px rgba(15, 23, 42, 0.2);
            padding: 14px;
            display: grid;
            gap: 10px;
        }

        #action-modal-title {
            margin: 0;
            font-size: 1.02rem;
            color: #0f172a;
        }

        #action-modal-message {
            margin: 0;
            color: #475569;
            font-size: 0.92rem;
        }

        #action-modal-input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 0.93rem;
        }

        #action-modal-input.hidden {
            display: none;
        }

        #action-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        #action-modal-cancel {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #f8fafc;
            color: #334155;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
        }

        #action-modal-confirm {
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
        }

        #action-modal-confirm.danger {
            background: var(--danger);
        }

        @media (max-width: 980px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                border-right: 0;
                border-bottom: 1px solid var(--panel-border);
            }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-title">
            <h1>AsynapRous</h1>
        </div>

        <div class="panel-section channels-panel">
            <div class="panel-header">
                <h3>Channels</h3>
                <button id="new-channel-btn" class="panel-add-btn" type="button">+ Add/Create</button>
            </div>
            <ul id="channel-list" class="item-list"></ul>
        </div>

        <div class="panel-section p2p-panel">
            <div class="panel-header">
                <h3>P2P Conversations</h3>
                <button id="new-p2p-btn" class="panel-add-btn" type="button">+ New P2P</button>
            </div>
            <ul id="p2p-room-list" class="item-list"></ul>
        </div>

        <div id="account-strip">
            <div>
                <div id="account-user">User: -</div>
                <div id="account-peer-id">Peer ID: -</div>
            </div>
            <button id="logout-btn" type="button">Sign out</button>
        </div>
    </div>

    <div id="chat-area">
        <div id="header">
            <div id="header-main">
                <h2 id="current-room-title">No room selected</h2>
                <p id="current-room-subtitle">Choose a channel, a peer, or create a private room.</p>
            </div>
            <button id="close-conversation-btn" class="hidden" type="button">Close</button>
        </div>

        <div id="workspace-tools">
            <div id="p2p-composer" class="composer">
                <div class="tool-row">
                    <input id="peer-search-input" type="text" placeholder="Search user ID or peer ID">
                </div>
                <ul id="p2p-peer-search-results"></ul>

                <div id="selected-peer-row">
                    <div id="selected-peer-preview"></div>
                    <button id="peer-overflow-toggle" class="btn mini secondary hidden" type="button">... ▾</button>
                </div>

                <div id="selected-peer-overflow" class="hidden"></div>

                <div id="p2p-actions">
                    <button id="create-private-room-btn" class="btn" type="button">Create Conversation</button>
                </div>
            </div>
        </div>

        <div id="messages"></div>

        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message and press Enter">
            <button id="send-btn" class="btn" type="button">Send</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="action-modal" role="dialog" aria-modal="true" aria-labelledby="action-modal-title">
        <div id="action-modal-card">
            <h3 id="action-modal-title">Confirm Action</h3>
            <p id="action-modal-message"></p>
            <input id="action-modal-input" type="text" class="hidden" placeholder="">
            <div id="action-modal-actions">
                <button id="action-modal-cancel" type="button">Cancel</button>
                <button id="action-modal-confirm" type="button">Confirm</button>
            </div>
        </div>
    </div>

    <script src="/js/chat-ui.js"></script>
</body>
</html>
